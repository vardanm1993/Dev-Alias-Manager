<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="860" viewBox="0 0 1220 860" role="img" aria-labelledby="title desc">
  <title id="title">Dev Alias Manager Daily Favorites preview</title>
  <desc id="desc">Terminal preview showing the Daily Favorites table, numbered menu actions, and Choose action prompt.</desc>
  <rect width="1220" height="860" rx="22" fill="#171717"/>
  <rect x="28" y="28" width="1164" height="804" rx="18" fill="#0d0f12" stroke="#3f3f46" stroke-width="2"/>

  <circle cx="64" cy="60" r="8" fill="#ff5f57"/>
  <circle cx="90" cy="60" r="8" fill="#ffbd2e"/>
  <circle cx="116" cy="60" r="8" fill="#28c840"/>
  <text x="150" y="67" fill="#fb7185" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" font-weight="700">Dev Alias Manager</text>
  <text x="990" y="67" fill="#71717a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">Laravel / Sail CLI</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19">
    <text x="58" y="120" fill="#f05340">╭────────────────────────────────────────────────────────────╮</text>
    <text x="58" y="149" fill="#f472b6">│ Daily Favorites                                            │</text>
    <text x="58" y="178" fill="#a1a1aa">│ Your short list for commands you use or forget often.      │</text>
    <text x="58" y="207" fill="#f05340">╰────────────────────────────────────────────────────────────╯</text>

    <text x="58" y="257" fill="#71717a">┌──────┬────────────────────┬──────────────┬────────────────────────────────────────────┐</text>
    <text x="58" y="286" fill="#fb7185">│ No   │ Alias              │ Pack         │ Subtitle                                   │</text>
    <text x="58" y="315" fill="#71717a">├──────┼────────────────────┼──────────────┼────────────────────────────────────────────┤</text>
    <text x="58" y="344" fill="#f4f4f5">│ <tspan fill="#fb923c">1</tspan>    │ <tspan fill="#ffffff">sup</tspan>                │ <tspan fill="#fb923c">sail</tspan>         │ Start Sail detached                        │</text>
    <text x="58" y="373" fill="#71717a">├──────┼────────────────────┼──────────────┼────────────────────────────────────────────┤</text>
    <text x="58" y="402" fill="#f4f4f5">│ <tspan fill="#fb923c">2</tspan>    │ <tspan fill="#ffffff">supb</tspan>               │ <tspan fill="#fb923c">sail</tspan>         │ Start Sail with build                      │</text>
    <text x="58" y="431" fill="#71717a">├──────┼────────────────────┼──────────────┼────────────────────────────────────────────┤</text>
    <text x="58" y="460" fill="#f4f4f5">│ <tspan fill="#fb923c">3</tspan>    │ <tspan fill="#ffffff">myroutes</tspan>           │ <tspan fill="#fb7185">laravel</tspan>      │ Show Laravel routes                        │</text>
    <text x="58" y="489" fill="#71717a">└──────┴────────────────────┴──────────────┴────────────────────────────────────────────┘</text>

    <text x="58" y="555" fill="#fb7185">1</text>
    <text x="78" y="555" fill="#f4f4f5">Browse &amp; add</text>
    <text x="236" y="555" fill="#fb923c">2</text>
    <text x="256" y="555" fill="#f4f4f5">Quick add</text>
    <text x="382" y="555" fill="#38bdf8">3</text>
    <text x="402" y="555" fill="#f4f4f5">Search &amp; add</text>
    <text x="568" y="555" fill="#22c55e">4</text>
    <text x="588" y="555" fill="#f4f4f5">Run list</text>
    <text x="705" y="555" fill="#facc15">5</text>
    <text x="725" y="555" fill="#f4f4f5">Move up</text>

    <text x="58" y="592" fill="#f472b6">6</text>
    <text x="78" y="592" fill="#f4f4f5">Move down</text>
    <text x="225" y="592" fill="#fb7185">7</text>
    <text x="245" y="592" fill="#f4f4f5">Set position</text>
    <text x="408" y="592" fill="#facc15">8</text>
    <text x="428" y="592" fill="#f4f4f5">Clear list</text>
    <text x="560" y="592" fill="#a1a1aa">0</text>
    <text x="580" y="592" fill="#f4f4f5">Exit</text>

    <text x="58" y="662" fill="#fb7185">Choose action</text>
    <text x="206" y="662" fill="#fb923c">›</text>
    <text x="236" y="662" fill="#ffffff">3</text>
    <rect x="58" y="690" width="760" height="80" rx="10" fill="#121417" stroke="#27272a"/>
    <text x="82" y="724" fill="#a1a1aa">Search:</text>
    <text x="178" y="724" fill="#ffffff">sail</text>
    <text x="82" y="756" fill="#a1a1aa">Aliases to add from results:</text>
    <text x="414" y="756" fill="#ffffff">sup supb sdown</text>
  </g>
</svg>
